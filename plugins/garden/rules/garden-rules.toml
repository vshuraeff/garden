implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "D-VER-007"
principle = "D"
title = "Independent review lenses"
level = "DEFAULT"
digest = "Run relevant independent review lenses and treat LLM findings as hypotheses requiring confirmation."
scope = "changes selected for independent review."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

