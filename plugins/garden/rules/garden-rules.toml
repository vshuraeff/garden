[[rules]]
id = "E-EXPL-001"
principle = "E"
title = "Boundary contracts"
level = "REQUIRED"
digest = "State shapes, validation, compatibility expectations, and ownership at public APIs, trust boundaries, and persistence formats."
scope = "public, trust, and persistence boundaries."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "E-EXPL-002"
principle = "E"
title = "Behavioral state"
level = "REQUIRED"
digest = "Expose side effects, external dependencies, and state transitions at the boundary that controls them. Do not let hidden ambient state determine cross-boundary domain behavior."
scope = "domain side effects, external dependencies, and state transitions."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "E-EXPL-003"
principle = "E"
title = "Operational decisions"
level = "REQUIRED"
digest = "Expose retry, timeout, authorization, and cross-boundary error policies, including stable error codes, structured fields, and owners."
scope = "operational and authorization boundaries."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "E-EXPL-004"
principle = "E"
title = "Proportionate local explicitness"
level = "DEFAULT"
digest = "Keep local explicitness proportionate. Do not require a named constant for every literal, full type ceremony inside a small function, manual injection for static dependencies, replacement of generated wiring, or abandonment of reasonable framework defaults."
scope = "implementation inside an already explicit boundary."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "E-EXPL-005"
principle = "E"
title = "Narrow magic-value rule"
level = "DEFAULT"
digest = "Name or explain a literal only when it affects domain or operational behavior and is not obvious at its point of use."
scope = "domain and operational literals."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "E-EXPL-006"
