# canonical source of GARDEN rule metadata. runtime metadata and the rules digest
# derive from this registry; human-authored definition and procedure prose lives in
# docs/reference/principles.md and docs/reference/checklist.md.
# plugins/garden/tools/validate_registry.py checks drift with those documents.

[[rules]]
id = "G-DISC-001"
principle = "G"
title = "Recoverable relationships"
level = "REQUIRED"
digest = "Make production domain relationships recoverable through grep, an AST or LSP, a symbol index, a route map, a plugin or schema registry, or generated wiring. Back dynamic dispatch with a machine-readable manifest, schema, registry, or generated map."
scope = "production domain relationships and runtime dispatch."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "G-DISC-002"
principle = "G"
title = "Bounded canonical names"
level = "REQUIRED"
digest = "Use one canonical name inside each bounded context. Add explicit translation maps at boundaries whose contexts use different names."
scope = "domain concepts crossing a bounded-context boundary."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "G-DISC-003"
principle = "G"
title = "Stable error identity"
level = "REQUIRED"
digest = "Give cross-boundary errors stable machine-readable codes and structured fields. Human-readable text is not a compatibility key."
scope = "public, process, service, and operational error boundaries."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "G-DISC-004"
principle = "G"
title = "Concept-aligned locations"
level = "DEFAULT"
digest = "Align files, symbols, routes, tests, and docs with the bounded context's canonical concepts or registry entries."
scope = "project-owned source and knowledge artifacts."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "G-DISC-005"
principle = "G"
title = "Lowest-cost graph mechanism"
level = "DEFAULT"
digest = "Use the lowest-cost graph mechanism the stack can inspect reliably; direct references are not mandatory when a registry or generated graph is authoritative."
scope = "relationship mechanisms selected by the project."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "G-DISC-006"
principle = "G"
title = "Resolution effort"
level = "EXPERIMENTAL"
scope = "sampled entry-point-to-handler or schema traversals."
implementation = "experimental"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "A-LOC-001"
principle = "A"
title = "Stated capability strategy"
level = "REQUIRED"
digest = "State how each production capability maps to its code, state, tests, operational artifacts, boundaries, and owner."
scope = "production capabilities."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "A-LOC-002"
principle = "A"
title = "Verified boundary crossings"
level = "REQUIRED"
digest = "Identify affected contracts and run relevant compatibility or integration checks when a change crosses a capability, trust, persistence, or deployment boundary."
scope = "boundary-crossing changes."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "A-LOC-003"
principle = "A"
title = "Low change-distance"
level = "DEFAULT"
digest = "Minimize unrelated modules touched, boundary crossings, requisite context, and ownership handoffs for a typical capability change. Choose the physical layout that fits the stack."
scope = "completed capability changes sampled by the project."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "A-LOC-004"
principle = "A"
title = "Discoverable tests"
level = "DEFAULT"
digest = "Colocate tests when the stack supports it; otherwise maintain a stable production-to-test map."
scope = "project-owned executable behavior."
implementation = "partial"
runtime_aliases = ["A-colocated-tests"]
configuration_keys = []
exception_policy = "configuration override with owner, reason, alternate discovery mechanism, and review trigger"
exception_allowed = true

[[rules]]
id = "A-LOC-005"
principle = "A"
title = "Rule of Three"
level = "DEFAULT"
digest = "Apply the Rule of Three before sharing an abstraction. Override it only for a documented boundary, security control, or platform constraint."
scope = "new shared abstractions."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "A-LOC-006"
principle = "A"
title = "Change-locality profile"
level = "EXPERIMENTAL"
scope = "a representative sample of completed capability changes."
implementation = "experimental"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "R-REPL-001"
principle = "R"
title = "Replaceability evidence"
level = "REQUIRED"
digest = "Record applicable replaceability evidence: public interface or schema, behavioral examples, characterization tests, property tests where applicable, compatibility tests, non-functional requirements, migration and rollback, observability, data ownership, and concurrency or ordering semantics. Mark omissions not applicable with a reason."
scope = "component boundaries whose replacement can affect correctness, compatibility, or security."
implementation = "partial"
runtime_aliases = [
  "R-boundary-contract-missing",
  "R-boundary-evidence-review",
  "R-component-contract",
]
configuration_keys = []
exception_policy = "category marked not applicable with boundary owner, reason, and supporting evidence"
exception_allowed = true

[[rules]]
id = "R-REPL-002"
principle = "R"
title = "Scoped versioning"
level = "REQUIRED"
digest = "Apply SemVer only to published APIs, independently deployed components, persisted schemas, external integrations, or boundaries explicitly designated as versioned. Track private internal modules through Git; do not add an artificial `Version:` line."
scope = "designated versioned boundaries and private modules evaluated for false versioning."
implementation = "partial"
runtime_aliases = ["R-contract-version"]
configuration_keys = []
exception_policy = "alternate versioning scheme with owner, artifact-specific reason, compatibility policy, and migration plan"
exception_allowed = true

[[rules]]
id = "R-REPL-003"
principle = "R"
title = "Characterize legacy behavior"
level = "REQUIRED"
digest = "Characterize legacy behavior before a replacement or behavior-preserving rewrite."
scope = "legacy rewrites and replacements."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "R-REPL-004"
principle = "R"
title = "Reproduce bugs first"
level = "REQUIRED"
digest = "Start a bug fix with a failing executable test or reproducer."
scope = "changes classified as bug fixes."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "R-REPL-005"
principle = "R"
title = "Protect undocumented behavior"
level = "REQUIRED"
digest = "Do not rewrite observable undocumented behavior without compatibility evidence for affected consumers."
scope = "observable legacy or de facto API behavior."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "R-REPL-006"
principle = "R"
title = "Contract-first public boundaries"
level = "REQUIRED"
digest = "Define a greenfield public boundary's behavior and compatibility expectations before implementation. Do not apply contract-first rewriting to legacy code before characterization."
scope = "greenfield public APIs and external integration boundaries."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "R-REPL-007"
principle = "R"
title = "Replace through boundaries"
level = "DEFAULT"
digest = "Use declared interfaces, schemas, adapters, or ports when they reduce consumer coupling. Do not create an interface around a private module without replacement or test value."
scope = "extension and replacement design."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "R-REPL-008"
principle = "R"
title = "Replacement drill"
level = "EXPERIMENTAL"
scope = "boundaries selected for a safe drill."
implementation = "experimental"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "D-VER-001"
principle = "D"
title = "Explicit verification levels"
level = "REQUIRED"
digest = "Record the result or not-applicable reason for each relevant level: static validation; unit or property tests; integration or contract tests; security or fuzz testing; runtime assertions and telemetry; canary or staged rollout; independent review; and residual-risk acceptance."
scope = "every change, with level relevance determined by its risks."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "D-VER-002"
principle = "D"
title = "Reproducible executable checks"
level = "REQUIRED"
digest = "Run applicable types, lint, tests, and CI from versioned configuration. LLM review never substitutes for an executable check."
scope = "changes with an applicable executable check."
implementation = "automated"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "D-VER-003"
principle = "D"
title = "Visible flakiness"
level = "REQUIRED"
digest = "Do not hide a flaky check behind automatic retries or report retry-to-green as a clean pass."
scope = "executable verification gates."
implementation = "planned"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "D-VER-004"
principle = "D"
title = "Bounded risk acceptance"
level = "REQUIRED"
digest = "Record an owner, supporting evidence, scope, and expiry for every human residual-risk acceptance."
scope = "every human decision to proceed with unresolved risk."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "D-VER-005"
principle = "D"
title = "No self-certification"
level = "REQUIRED"
digest = "An agent must not be the sole authority that its own change is correct or ready to ship."
scope = "agent-authored or agent-modified changes."
implementation = "manual-with-owner"
runtime_aliases = []
configuration_keys = []
exception_policy = "not-allowed"
exception_allowed = false

[[rules]]
id = "D-VER-006"
principle = "D"
title = "Earliest useful gate"
level = "DEFAULT"
