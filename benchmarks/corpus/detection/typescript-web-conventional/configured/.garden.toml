schema_version = 1

[project]
type = "service"

[scan]
include = ["**/*.ts", "**/*.tsx", "**/*.json"]
exclude = ["**/contest.ts", "dist/**"]

[capabilities]
strategy = "explicit"
shared_roots = ["lib/shared"]

[capabilities.map]
"app/orders" = "orders"
"app/billing" = "billing"

[tests]
patterns = ["app/**/__tests__/*.test.ts", "tests/**/*.spec.ts"]
association = "test-roots"

[tests.test_roots]
"app/orders/__tests__" = "app/orders"
"tests/e2e" = "app/billing"

[documentation]
root_context_required = false
