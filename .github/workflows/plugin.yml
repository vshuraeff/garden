name: plugin

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Test deterministic tools and fixtures
        run: uv run --no-project -m unittest discover -s plugins/garden/tools -p "test_*.py" -v
      - name: Validate both plugin packages and reference copies
        run: uv run --no-project plugins/garden/tools/validate_package.py
      - name: Validate evidence registry and citations
        run: uv run --no-project plugins/garden/tools/validate_evidence.py
      - name: Validate documentation checks
        run: uv run --no-project plugins/garden/tools/validate_docs.py
      - name: Validate this repository's own GARDEN activation
        run: uv run --no-project plugins/garden/tools/garden_cli.py config validate .
      - name: Run the blocking GARDEN self-audit
        run: uv run --no-project plugins/garden/tools/garden_cli.py inspect --strict .
      - name: Require a plugin SemVer bump
        if: github.event_name == 'pull_request'
        run: uv run --no-project plugins/garden/tools/plugin_version.py check --base ${{ github.event.pull_request.base.sha }}
      - name: Lint deterministic tools
        run: uvx ruff check plugins/garden/tools && uvx ruff format --check plugins/garden/tools
      - name: Validate shell adapters
        run: bash -n plugins/garden/hooks/garden-check.sh plugins/garden/assets/garden-prompt.sh
